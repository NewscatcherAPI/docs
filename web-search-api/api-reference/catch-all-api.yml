openapi: 3.1.0
info:
  title: NewsCatcher CatchAll API
  version: 1.5.0
  description: |
    CatchAll is a web search API that generates unique datasets that don't exist anywhere else on the web. Built on NewsCatcher's proprietary real-world event index, it delivers state-of-the-art recall—finding all relevant events, not just top results.

    ### Authentication

    All endpoints except /health and /version require `x-api-key` header. If the key is invalid or missing, the API returns the `403 Forbidden` error.

    ### Job workflow

    1. (Optional) Get suggestions via /catchAll/initialize
    2. Submit a query via /catchAll/submit with optional date ranges and custom validators/enrichments
    3. Poll /catchAll/status/{job_id} until completed (10-15 minutes)
    4. Retrieve results via /catchAll/pull/{job_id}

    ### Monitor workflow

    1. Create successful job via /catchAll/submit
    2. Create monitor via /catchAll/monitors/create with schedule
    3. Retrieve aggregated results via /catchAll/monitors/pull/{monitor_id}

    ### Company search workflow

    1. Create a dataset via `POST /catchAll/datasets/` or `POST /catchAll/datasets/upload`
    2. Wait for the dataset `latest_status` to reach `ready`
    3. Submit a job with `connected_dataset_ids` pointing to your dataset
    4. Retrieve results — each record includes a `connected_entities` array
       with relevance scores per matched company

    ### Important notes

    **Dynamic schemas**: Response schemas are generated dynamically by LLMs. Field names in the `enrichment` object may vary and are not deterministic across jobs unless explicitly specified.

  contact:
    name: NewsCatcher
    url: https://newscatcherapi.com
    email: support@newscatcherapi.com

externalDocs:
  description: Find out more about NewsCatcher CatchAll API
  url: https://www.newscatcherapi.com/docs/web-search-api/get-started/introduction

servers:
  - url: https://catchall.newscatcherapi.com
    description: Production server

tags:
  - name: Jobs
    description: Operations to create, monitor, and retrieve job results.
    externalDocs:
      description: Learn about job lifecycle and status tracking
      url: https://www.newscatcherapi.com/docs/web-search-api/get-started/quickstart
  - name: Monitors
    description: Operations to create, operate and retrieve monitor results.
    externalDocs:
      description:
        Automate recurring queries with scheduled jobs and webhook
        notifications.
      url: https://www.newscatcherapi.com/docs/web-search-api/guides-and-concepts/monitors
  - name: Entities
    description: |
      Operations to create, update, and delete company entities.

      Entities are the building blocks of Company Watchlist. Each entity represents
      a company (or person) you want to track. Add identifying information such as
      domain, alternative names, and key persons to improve matching quality.
    externalDocs:
      description: Learn about Company Watchlist and entities
      url: https://www.newscatcherapi.com/docs/web-search-api/guides-and-concepts/company-search
  - name: Datasets
    description: |
      Operations to create and manage datasets of entities.

      A dataset is a named collection of entities — think of it as a watchlist or
      portfolio. Connect a dataset to a job via `connected_dataset_ids` to activate
      Company Watchlist. Datasets can be reused across multiple jobs and monitors.
    externalDocs:
      description: Learn about datasets and Company Watchlist
      url: https://www.newscatcherapi.com/docs/web-search-api/guides-and-concepts/company-search
  - name: Meta
    description: Operations to check API health and version.

security:
  - ApiKeyAuth: []

paths:
  # ── Jobs ──────────────────────────────────────────────────────────────

  /catchAll/jobs/user:
    get:
      tags:
        - Jobs
      summary: List user jobs
      description: Returns all jobs created by the authenticated user.
      operationId: getUserJobs
      externalDocs:
        description: Learn about job management
        url: https://www.newscatcherapi.com/docs/web-search-api/api-reference/jobs/list-user-jobs
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Ownership"
      responses:
        "200":
          $ref: "#/components/responses/ListUserJobsResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /catchAll/initialize:
    post:
      tags:
        - Jobs
      summary: Initialize job
      description:
        Get suggested validators, enrichments, and date ranges for a query.
      operationId: initialize
      externalDocs:
        description: Learn about validator and enrichment suggestions
        url: https://www.newscatcherapi.com/docs/web-search-api/api-reference/jobs/initialize-job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitializeRequestDto"
            example:
              query: "Series B funding rounds for SaaS startups"
              context: "Focus on funding amount and company name"
      responses:
        "200":
          $ref: "#/components/responses/InitializeResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /catchAll/submit:
    post:
      tags:
        - Jobs
      summary: Create job
      description: Submit a query to create a new processing job.
      operationId: createJob
      externalDocs:
        description: Detailed documentation for job creation
        url: https://www.newscatcherapi.com/docs/web-search-api/api-reference/jobs/create-job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitRequestDto"
            example:
              query: "Series B funding rounds for SaaS startups"
              context: "Focus on funding amount and company name"
              start_date: "2026-02-18T00:00:00Z"
              end_date: "2026-02-23T00:00:00Z"
              limit: 10
              mode: "base"
      responses:
        "200":
          $ref: "#/components/responses/SubmitResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /catchAll/status/{job_id}:
    get:
      tags:
        - Jobs
      summary: Get job status
      description: Retrieve the current processing status of a job.
      operationId: getJobStatus
      externalDocs:
        description: Understanding job statuses and polling
        url: https://www.newscatcherapi.com/docs/web-search-api/api-reference/jobs/get-job-status
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          $ref: "#/components/responses/StatusResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /catchAll/pull/{job_id}:
    get:
      tags:
        - Jobs
      summary: Get job results
      description: Retrieve the final results for a completed job.
      operationId: getJobResults
      externalDocs:
        description: Working with job results and dynamic schemas
        url: https://www.newscatcherapi.com/docs/web-search-api/api-reference/jobs/get-job-results
      parameters:
        - $ref: "#/components/parameters/JobId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          $ref: "#/components/responses/PullJobResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /catchAll/continue:
    post:
      tags:
        - Jobs
      summary: Continue job
      description:
        Continue an existing job to process more records beyond the initial
        limit.
      operationId: continueJob
      externalDocs:
        description: Learn about job continuation and limits
        url: https://www.newscatcherapi.com/docs/web-search-api/api-reference/jobs/continue-job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContinueRequestDto"
            example:
              job_id: "5f0c9087-85cb-4917-b3c7-e5a5eff73a0c"
              new_limit: 100
      responses:
        "200":
          $ref: "#/components/responses/ContinueResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /catchAll/jobs/{job_id}:
    delete:
      tags:
        - Jobs
      summary: Delete job
      description: |
        Soft-deletes a job. The job is flagged as deleted and no longer
        appears in list results. The underlying data is retained.

        Only the job owner can delete a job. Returns `404` if the job is not
        found or does not belong to the authenticated user.

        Deleting an already-deleted job returns `200`.
      operationId: deleteJob
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          $ref: "#/components/responses/DeleteJobResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ── Monitors ──────────────────────────────────────────────────────────────

  /catchAll/monitors:
    get:
      tags:
        - Monitors
      summary: List monitors
      description: Returns all monitors created by the authenticated user.
      operationId: listMonitors
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Ownership"
      responses:
        "200":
          $ref: "#/components/responses/ListMonitorsResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /catchAll/monitors/create:
    post:
      tags:
        - Monitors
      summary: Create monitor
      description: Create a scheduled monitor based on a reference job.
      operationId: createMonitor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMonitorRequestDto"
            example:
              reference_job_id: "5f0c9087-85cb-4917-b3c7-e5a5eff73a0c"
              schedule: "every day at 12 PM UTC"
              backfill: true
              limit: 10
              webhook:
                url: "https://your-endpoint.com/webhook"
                method: "POST"
                headers:
                  Authorization: "Bearer your_token_here"
      responses:
        "200":
          $ref: "#/components/responses/CreateMonitorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /catchAll/monitors/pull/{monitor_id}:
    get:
      tags:
        - Monitors
      summary: Get monitor results
      description:
        Retrieve aggregated results from all jobs executed by a monitor.
      operationId: pullMonitorResults
      parameters:
        - name: monitor_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Monitor identifier.
      responses:
        "200":
          $ref: "#/components/responses/PullMonitorResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /catchAll/monitors/{monitor_id}/jobs:
    get:
      tags:
        - Monitors
      summary: List monitor jobs
      description: Return all jobs executed by a monitor.
      operationId: listMonitorJobs
      parameters:
        - name: monitor_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Monitor identifier.
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: ["asc", "desc"]
            default: "asc"
          description: Sort by start_date (asc or desc).
      responses:
        "200":
          $ref: "#/components/responses/ListMonitorJobsResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /catchAll/monitors/{monitor_id}/status:
    get:
      tags:
        - Monitors
      summary: Get monitor status history
      description: |
        Returns the full execution history of a monitor as a list of status entries, ordered from newest to oldest.
      operationId: getMonitorStatusHistory
      parameters:
        - name: monitor_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Monitor identifier.
      responses:
        "200":
          $ref: "#/components/responses/MonitorStatusHistoryResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /catchAll/monitors/{monitor_id}/enable:
    post:
      tags:
        - Monitors
      summary: Enable monitor
      description: Resume scheduled job execution for a monitor.
      operationId: enableMonitor
      parameters:
        - name: monitor_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Monitor identifier.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnableMonitorRequestDto"
            example:
              backfill: true
      responses:
        "200":
          description: Monitor enabled successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                  - monitor_id
                properties:
                  success:
                    type: boolean
                    description: Whether the operation succeeded.
                    example: true
                  message:
                    type: string
                    description: Human-readable success message.
                    example: "Monitor enabled successfully."
                  monitor_id:
                    type: string
                    format: uuid
                    description: ID of the enabled monitor.
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /catchAll/monitors/{monitor_id}/disable:
    post:
      tags:
        - Monitors
      summary: Disable monitor
      description: Stop scheduled job execution for a monitor.
      operationId: disableMonitor
      parameters:
        - name: monitor_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Monitor identifier.
      responses:
        "200":
          description: Monitor disabled successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                  - monitor_id
                properties:
                  success:
                    type: boolean
                    description: Whether the operation succeeded.
                    example: true
                  message:
                    type: string
                    description: Human-readable success message.
                    example: "Monitor disabled successfully."
                  monitor_id:
                    type: string
                    format: uuid
                    description: ID of the disabled monitor.
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /catchAll/monitors/{monitor_id}:
    patch:
      tags:
        - Monitors
      summary: Update monitor
      description: Update the webhook configuration for an existing monitor.
      operationId: updateMonitor
      externalDocs:
        description: Learn about monitor configuration
        url: https://www.newscatcherapi.com/docs/web-search-api/how-to/configure-monitors
      parameters:
        - name: monitor_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Monitor identifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMonitorRequestDto"
            example:
              webhook:
                url: "https://new-endpoint.com/webhook"
                method: "POST"
                headers:
                  Authorization: "Bearer new_token_xyz"
      responses:
        "200":
          $ref: "#/components/responses/UpdateMonitorResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags:
        - Monitors
      summary: Delete monitor
      description: |
        Soft-deletes a monitor. The monitor is flagged as deleted, stops
        executing scheduled jobs immediately, and no longer appears in list
        results.

        Only the monitor owner can delete a monitor. Returns `404` if the
        monitor is not found or does not belong to the authenticated user.

        Deleting an already-deleted monitor returns `200`.
      operationId: deleteMonitor
      parameters:
        - name: monitor_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Monitor identifier.
      responses:
        "200":
          $ref: "#/components/responses/DeleteMonitorResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ── Entities ──────────────────────────────────────────────────────────────

  /catchAll/entities:
    get:
      tags:
        - Entities
      summary: List entities
      description: |
        Returns a paginated list of entities belonging to the authenticated
        organization. Supports filtering by status and entity type, and
        sorting by name, status, or creation date.
      operationId: listEntities
      parameters:
        - $ref: "#/components/parameters/Page"
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
          description: Number of entities per page.
        - name: search
          in: query
          required: false
          schema:
            type: string
          description:
            Filter entities by name (case-insensitive substring match).
          example: NewsCatcher
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EntityStatus"
        - name: entity_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EntityType"
        - name: sort_by
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EntitySortBy"
        - name: sort_order
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortOrder"
      responses:
        "200":
          $ref: "#/components/responses/EntityListResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

    post:
      tags:
        - Entities
      summary: Create entity
      description: |
        Creates a new company entity and begins background enrichment.

        The entity status starts as `pending` and transitions to `ready` once
        enrichment completes. Provide as much identifying information as
        possible — `domain` is the highest-signal field because it is
        unambiguous.
      operationId: createEntity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntityRequest"
            example:
              name: NewsCatcher
              entity_type: company
              description: AI-powered news data provider
              additional_attributes:
                company_attributes:
                  domain: newscatcherapi.com
                  alternative_names:
                    - NC
                    - NewsCatcher API
                  key_persons:
                    - Artem Bugara
                    - Maksym Sugonyaka
      responses:
        "200":
          $ref: "#/components/responses/CreateEntityResponse"
        "400":
          $ref: "#/components/responses/EntityBadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /catchAll/entities/batch:
    post:
      tags:
        - Entities
      summary: Create entities in batch
      description: |
        Creates multiple entities in a single request. Each entity is
        processed independently — a failure in one does not affect others.

        Returns an array of `{id, status}` objects in the same order as
        the input array.
      operationId: createEntitiesBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntitiesBatchRequest"
            example:
              entities:
                - name: OpenAI
                  entity_type: company
                  description: Artificial intelligence research company
                  additional_attributes:
                    company_attributes:
                      domain: openai.com
                      alternative_names:
                        - Open AI
                      key_persons:
                        - Sam Altman
                - name: Stripe
                  entity_type: company
                  description: Online payment processing platform
                  additional_attributes:
                    company_attributes:
                      domain: stripe.com
                      key_persons:
                        - Patrick Collison
                        - John Collison
      responses:
        "200":
          $ref: "#/components/responses/CreateEntitiesBatchResponse"
        "400":
          $ref: "#/components/responses/EntityBadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /catchAll/entities/{entity_id}:
    get:
      tags:
        - Entities
      summary: Get entity
      description:
        Returns a single entity by ID with all attributes and current status.
      operationId: getEntity
      parameters:
        - $ref: "#/components/parameters/EntityId"
      responses:
        "200":
          $ref: "#/components/responses/EntityResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    patch:
      tags:
        - Entities
      summary: Update entity
      description: |
        Updates one or more fields of an existing entity.
      operationId: updateEntity
      parameters:
        - $ref: "#/components/parameters/EntityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEntityRequest"
            example:
              description: Updated description
              additional_attributes:
                company_attributes:
                  alternative_names:
                    - NC
                    - NewsCatcher API
                    - NCA
      responses:
        "200":
          $ref: "#/components/responses/EntityResponse"
        "400":
          $ref: "#/components/responses/EntityBadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      tags:
        - Entities
      summary: Delete entity
      description: |
        Permanently deletes an entity. The entity is removed from all
        datasets and the search index. This operation cannot be undone.
      operationId: deleteEntity
      parameters:
        - $ref: "#/components/parameters/EntityId"
      responses:
        "204":
          description: Entity deleted successfully. No response body.
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ── Datasets ──────────────────────────────────────────────────────────────

  /catchAll/datasets:
    get:
      tags:
        - Datasets
      summary: List datasets
      description: |
        Returns a paginated list of datasets belonging to the authenticated
        organization. Supports filtering by status and sorting by name,
        status, or creation date.
      operationId: listDatasets
      parameters:
        - $ref: "#/components/parameters/Page"
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
          description: Number of datasets per page.
        - name: search
          in: query
          required: false
          schema:
            type: string
          description:
            Filter datasets by name (case-insensitive substring match).
          example: Portfolio
        - name: latest_status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DatasetStatus"
          description: |
            Filter by dataset status.
        - name: sort_by
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DatasetSortBy"
        - name: sort_order
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortOrder"
        - $ref: "#/components/parameters/Ownership"
      responses:
        "200":
          $ref: "#/components/responses/DatasetListResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

    post:
      tags:
        - Datasets
      summary: Create dataset
      description: |
        Creates a new dataset from a list of existing entity IDs.

        If any of the provided entity IDs do not exist or do not belong to
        your organization, the request fails with `400`. All entity IDs must
        be valid before the dataset is created.

        To create a dataset and entities in one step, use the [`Create dataset from CSV`](https://www.newscatcherapi.com/docs/web-search-api/api-reference/datasets/create-dataset-from-csv)
        endpoint instead.
      operationId: createDataset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatasetRequest"
            example:
              name: My Portfolio
              description: Companies in our investment portfolio
              entity_ids:
                - 854198fa-f702-49db-a381-0427fa87f173
                - a1b2c3d4-e5f6-7890-abcd-ef1234567890
      responses:
        "200":
          $ref: "#/components/responses/DatasetResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /catchAll/datasets/upload:
    post:
      tags:
        - Datasets
      summary: Create dataset from CSV
      description: |
        Creates a new dataset by uploading a CSV file. Each row in the CSV
        becomes an entity. The `name` column is required; all other columns
        are optional.

        **CSV format:**
        ```csv
        name,description,domain,alternative_names,key_persons
        NewsCatcher,"AI-powered news data provider",newscatcherapi.com,"NC;NewsCatcher API","Artem Bugara;Maksym Sugonyaka"
        OpenAI,"Artificial intelligence research company",openai.com,"Open AI","Sam Altman"
        ```

        Use semicolons (`;`) to separate multiple values in `alternative_names` and `key_persons`. Rows with empty `name` are skipped and reported in `validation_report`. 

        **Note**: The response shape differs from the JSON dataset creation endpoint: it returns `dataset_id` (not `id`) and includes a `validation_report` with details on skipped rows.
      operationId: createDatasetFromCsv
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - name
              properties:
                file:
                  type: string
                  format: binary
                  description: The CSV file to upload.
                name:
                  type: string
                  description: Name for the new dataset.
                  example: My Portfolio
                description:
                  type: string
                  description: Optional description for the dataset.
                  example: Companies from Q1 2026 watchlist
      responses:
        "200":
          $ref: "#/components/responses/CreateDatasetCsvResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /catchAll/datasets/{dataset_id}:
    get:
      tags:
        - Datasets
      summary: Get dataset
      description:
        Returns a single dataset by ID including entity count and current
        status.
      operationId: getDataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          $ref: "#/components/responses/DatasetResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    patch:
      tags:
        - Datasets
      summary: Update dataset
      description: |
        Updates the name or description of a dataset.
      operationId: updateDataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDatasetRequest"
            example:
              name: My Portfolio (updated)
              description: Updated Q1 2026 watchlist
      responses:
        "200":
          $ref: "#/components/responses/DatasetResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags:
        - Datasets
      summary: Delete dataset
      description: |
        Permanently deletes a dataset. The entities within the dataset are
        not deleted — only the dataset itself. This operation cannot be
        undone.
      operationId: deleteDataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "204":
          description: Dataset deleted successfully. No response body.
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /catchAll/datasets/{dataset_id}/entities:
    get:
      tags:
        - Datasets
      summary: List entities in dataset
      description: |
        Returns a paginated list of entities in a dataset. Supports filtering by status and entity type.
      operationId: listEntitiesInDataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
        - $ref: "#/components/parameters/Page"
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
          description: Number of entities per page.
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Filter entities by name.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EntityStatus"
        - name: entity_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EntityType"
        - name: sort_by
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EntitySortBy"
        - name: sort_order
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SortOrder"
      responses:
        "200":
          $ref: "#/components/responses/DatasetEntityListResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    post:
      tags:
        - Datasets
      summary: Add entities to dataset
      description: |
        Adds one or more existing entities to a dataset. Returns the number of entities added.
      operationId: addEntitiesToDataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetEntityIdsRequest"
            example:
              entity_ids:
                - 854198fa-f702-49db-a381-0427fa87f173
      responses:
        "200":
          $ref: "#/components/responses/ManageEntitiesResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags:
        - Datasets
      summary: Remove entities from dataset
      description: |
        Removes one or more entities from a dataset. The entities themselves
        are not deleted — they are only removed from this dataset. Returns
        the number of entities removed.
      operationId: removeEntitiesFromDataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetEntityIdsRequest"
            example:
              entity_ids:
                - 854198fa-f702-49db-a381-0427fa87f173
      responses:
        "200":
          $ref: "#/components/responses/ManageEntitiesResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /catchAll/datasets/{dataset_id}/status:
    get:
      tags:
        - Datasets
      summary: Get dataset status history
      description: |
        Returns the full status change history for a dataset, ordered
        chronologically from oldest to newest.
      operationId: getDatasetStatusHistory
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      responses:
        "200":
          $ref: "#/components/responses/DatasetStatusHistoryResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /catchAll/datasets/{dataset_id}/upload:
    post:
      tags:
        - Datasets
      summary: Add companies to dataset via CSV
      description: |
        Appends new companies to an existing dataset by uploading a CSV file.
        Uses the same CSV format as the dataset creation endpoint.

        The response omits `dataset_name` compared to the create-from-CSV
        endpoint since the dataset already exists.
      operationId: uploadCSVToDataset
      parameters:
        - $ref: "#/components/parameters/DatasetId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: The CSV file to upload.
      responses:
        "200":
          $ref: "#/components/responses/UploadCsvToDatasetResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ── Meta ──────────────────────────────────────────────────────────────

  /health:
    get:
      tags:
        - Meta
      summary: Check health
      description: Check API availability.
      operationId: healthCheck
      security: []
      responses:
        "200":
          $ref: "#/components/responses/HealthCheckResponse"

  /version:
    get:
      tags:
        - Meta
      summary: Get version
      description: Returns current API version.
      operationId: getVersion
      security: []
      responses:
        "200":
          $ref: "#/components/responses/VersionResponse"

  /catchAll/user/limits:
    post:
      tags:
        - Meta
      summary: Get plan limits
      description: |
        Returns plan features and current usage for the authenticated organization.
      operationId: getPlanLimits
      responses:
        "200":
          $ref: "#/components/responses/GetPlanLimitsResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"

components:
  parameters:
    JobId:
      name: job_id
      in: path
      required: true
      description: |
        Unique job identifier returned from [`POST /catchAll/submit`](https://www.newscatcherapi.com/docs/web-search-api/api-reference/jobs/create-job).
      schema:
        type: string
        format: uuid
      example: "5f0c9087-85cb-4917-b3c7-e5a5eff73a0c"

    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
      description: |
        Page number to retrieve.

    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        default: 100
        minimum: 1
        maximum: 1000
      description: |
        Number of records per page.

    EntityId:
      name: entity_id
      in: path
      required: true
      description: Unique entity identifier.
      schema:
        type: string
        format: uuid
      example: "854198fa-f702-49db-a381-0427fa87f173"

    DatasetId:
      name: dataset_id
      in: path
      required: true
      description: Unique dataset identifier.
      schema:
        type: string
        format: uuid
      example: "ccabb755-afc2-4047-b84c-78d1f23d49b2"

  responses:
    InitializeResponse:
      description: Suggestions retrieved successfully
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InitializeResponseDto"
          example:
            query: "Series B funding rounds for SaaS startups"
            context: "Focus on funding amount and company name"
            validators:
              - name: "is_series_b_funding"
                description:
                  "true if the web page describes a Series B funding round"
                type: "boolean"
              - name: "is_saas_startup"
                description:
                  "true if the company receiving funding is a SaaS startup"
                type: "boolean"
            enrichments:
              - name: "funding_amount"
                description:
                  "Extract the amount of funding received in the Series B round"
                type: "number"
              - name: "investee_company"
                description:
                  "Extract the name of the SaaS startup receiving the funding"
                type: "company"
              - name: "investor_company"
                description: "Extract the name of the lead investor"
                type: "company"
              - name: "funding_date"
                description:
                  "Extract the date when the funding round was announced"
                type: "date"
            start_date: "2026-02-19T00:00:00Z"
            end_date: "2026-02-24T00:00:00Z"
            date_modification_message:
              - "No dates were provided; using a default window of 5 days."

    SubmitResponse:
      description: Job created successfully
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubmitResponseDto"
          example:
            job_id: "5f0c9087-85cb-4917-b3c7-e5a5eff73a0c"

    ContinueResponse:
      description: Job continuation accepted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ContinueResponseDto"
          example:
            job_id: "5f0c9087-85cb-4917-b3c7-e5a5eff73a0c"
            previous_limit: 10
            new_limit: 100
            status: "accepted"

    StatusResponse:
      description: Status retrieved successfully
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StatusResponseDto"
          example:
            job_id: "5f0c9087-85cb-4917-b3c7-e5a5eff73a0c"
            status: "completed"
            steps:
              - status: "submitted"
                order: 1
                completed: true
              - status: "analyzing"
                order: 2
                completed: true
              - status: "fetching"
                order: 3
                completed: true
              - status: "clustering"
                order: 4
                completed: true
              - status: "enriching"
                order: 5
                completed: true
              - status: "completed"
                order: 6
                completed: true
              - status: "failed"
                order: 7
                completed: false

    ListUserJobsResponse:
      description: User jobs retrieved successfully
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ListUserJobsResponseDto"
          example:
            total: 27
            page: 1
            page_size: 2
            total_pages: 14
            jobs:
              - job_id: "5f0c9087-85cb-4917-b3c7-e5a5eff73a0c"
