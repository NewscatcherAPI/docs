          minimum: 1.0
          title: Page Size
          default: 100
        name: page_size
        in: query
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListWebhookResourcesResponseDTO'
        '403':
          description: Not authorized.
        '404':
          description: Webhook not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/webhooks/{webhook_id}/resources/{resource_type}/{resource_id}:
    delete:
      tags:
      - Webhooks
      summary: Remove resource from webhook
      description: Detaches a specific resource from this webhook. Future job/monitor
        runs will no longer trigger delivery to this webhook. Returns 204 No Content.
      operationId: removeWebhookResource
      parameters:
      - required: true
        schema:
          type: string
          format: uuid
          title: Webhook Id
        name: webhook_id
        in: path
      - required: true
        schema:
          $ref: '#/components/schemas/MappableResourceType'
        name: resource_type
        in: path
      - required: true
        schema:
          type: string
          format: uuid
          title: Resource Id
        name: resource_id
        in: path
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '403':
          description: Not authorized.
        '404':
          description: Webhook not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/resources/{resource_type}/{resource_id}/webhooks:
    get:
      tags:
      - Webhooks
      summary: List webhooks for a resource
      description: Returns all webhooks currently assigned to the given resource (job,
        monitor, or monitor_group). Use is_active filter to see only active or inactive
        webhooks.
      operationId: listWebhooksForResource
      parameters:
      - required: true
        schema:
          $ref: '#/components/schemas/MappableResourceType'
        name: resource_type
        in: path
      - required: true
        schema:
          type: string
          format: uuid
          title: Resource Id
        name: resource_id
        in: path
      - required: false
        schema:
          type: boolean
          title: Is Active
        name: is_active
        in: query
      - required: false
        schema:
          type: integer
          minimum: 1.0
          title: Page
          default: 1
        name: page
        in: query
      - required: false
        schema:
          type: integer
          maximum: 500.0
          minimum: 1.0
          title: Page Size
          default: 100
        name: page_size
        in: query
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '403':
          description: Resource does not belong to your organization.
        '404':
          description: Resource not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/webhook-history:
    get:
      tags:
      - Webhooks
      summary: Get webhook delivery history
      description: Returns paginated webhook delivery events for a given resource
        (job, monitor, or monitor_group), ordered by timestamp descending. Each record
        shows the webhook URL called, HTTP status, response body excerpt, and delivery
        timestamp. Written by the orchestrator after each dispatch.
      operationId: getWebhookDeliveryHistory
      parameters:
      - description: 'Resource type: job, monitor, monitor_group'
        required: true
        schema:
          allOf:
          - $ref: '#/components/schemas/MappableResourceType'
          description: 'Resource type: job, monitor, monitor_group'
        name: resource_type
        in: query
      - description: ID of the resource
        required: true
        schema:
          type: string
          format: uuid
          title: Resource Id
          description: ID of the resource
        name: resource_id
        in: query
      - required: false
        schema:
          type: integer
          minimum: 1.0
          title: Page
          default: 1
        name: page
        in: query
      - required: false
        schema:
          type: integer
          maximum: 500.0
          minimum: 1.0
          title: Page Size
          default: 50
        name: page_size
        in: query
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '403':
          description: Not authorized to view this resource's history.
        '404':
          description: Resource not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
servers:
- url: https://catchall.newscatcherapi.com
  description: Production server
externalDocs:
  description: Find out more about NewsCatcher CatchAll API
  url: https://www.newscatcherapi.com/docs/web-search-api/get-started/introduction
tags:
- name: Jobs
  description: Operations to create, monitor, and retrieve job results.
  externalDocs:
    description: Learn about job lifecycle and status tracking
    url: https://www.newscatcherapi.com/docs/web-search-api/get-started/quickstart
- name: Monitors
  description: Operations to create, operate and retrieve monitor results.
  externalDocs:
    description: Automate recurring queries with scheduled jobs and webhook notifications.
    url: https://www.newscatcherapi.com/docs/web-search-api/guides-and-concepts/monitors
- name: Entities
  description: 'Operations to create, update, and delete company entities.


    Entities are the building blocks of Company Watchlist. Each entity represents
    a company (or person) you want to track. Add identifying information such as domain,
    alternative names, and key persons to improve matching quality.'
  externalDocs:
    description: Learn about Company Watchlist and entities
    url: https://www.newscatcherapi.com/docs/web-search-api/guides-and-concepts/company-search
- name: Datasets
  description: 'Operations to create and manage datasets of entities.


    A dataset is a named collection of entities — think of it as a watchlist or portfolio.
    Connect a dataset to a job via `connected_dataset_ids` to activate Company Watchlist.
    Datasets can be reused across multiple jobs and monitors.'
  externalDocs:
    description: Learn about datasets and Company Watchlist
    url: https://www.newscatcherapi.com/docs/web-search-api/guides-and-concepts/company-search
- name: Projects
  description: 'Operations to create, organize, and manage projects.


    A project is a named container for jobs, monitors, and datasets. Group related
    resources by use case, team, or client, and share them with teammates. Resources
    can be assigned at creation time or post-hoc.'
  externalDocs:
    description: Learn about projects and resource organization
    url: https://www.newscatcherapi.com/docs/web-search-api/guides-and-concepts/projects
- name: Webhooks
  description: 'Operations to create, manage, and test webhooks.


    Webhooks deliver real-time notifications to your endpoint when monitor jobs complete.
    Configure URL, authentication, headers, and delivery mode.'
  externalDocs:
    description: Learn about webhooks and notifications
    url: https://www.newscatcherapi.com/docs/web-search-api/guides-and-concepts/webhooks
- name: Meta
  description: Operations to check API health and version.
components:
  schemas:
    CheckQueryQualityOutputDTO:
      properties:
        status:
          $ref: '#/components/schemas/QueryStatus'
        title:
