openapi: 3.1.0
info:
  title: NewsCatcher CatchAll API
  version: 1.6.0
  contact:
    name: NewsCatcher
    url: https://newscatcherapi.com
    email: support@newscatcherapi.com
  description: 'CatchAll is a web search API that generates unique datasets that don''t
    exist anywhere else on the web. Built on NewsCatcher''s proprietary real-world
    event index, it delivers state-of-the-art recall—finding all relevant events,
    not just top results.


    ### Authentication


    All endpoints except /health and /version require `x-api-key` header. If the key
    is invalid or missing, the API returns the `403 Forbidden` error.


    ### Job workflow


    1. (Optional) Get suggestions via /catchAll/initialize

    2. Submit a query via /catchAll/submit with optional date ranges and custom validators/enrichments

    3. Poll /catchAll/status/{job_id} until completed (10-15 minutes)

    4. Retrieve results via /catchAll/pull/{job_id}


    ### Monitor workflow


    1. Create successful job via /catchAll/submit

    2. Create monitor via /catchAll/monitors/create with schedule

    3. Retrieve aggregated results via /catchAll/monitors/pull/{monitor_id}


    ### Company search workflow


    1. Create a dataset via `POST /catchAll/datasets/` or `POST /catchAll/datasets/upload`

    2. Wait for the dataset `latest_status` to reach `ready`

    3. Submit a job with `connected_dataset_ids` pointing to your dataset

    4. Retrieve results — each record includes a `connected_entities` array with relevance
    scores per matched company


    ### Important notes


    **Dynamic schemas**: Response schemas are generated dynamically by LLMs. Field
    names in the `enrichment` object may vary and are not deterministic across jobs
    unless explicitly specified.'
paths:
  /catchAll/validate:
    post:
      tags:
      - Jobs
      summary: Check Query Quality
      description: 'Use this endpoint before submitting a job to validate that your
        query

        is well-formed and likely to produce good results.'
      operationId: check_query_quality_assist_check_query_quality_post
      parameters:
      - required: false
        schema:
          type: string
          title: X-Request-Id
        name: x-request-id
        in: header
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckQueryQualityInputDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckQueryQualityOutputDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/submit:
    post:
      tags:
      - Jobs
      summary: Create a new job
      description: 'Submits a natural-language query to the CatchAll pipeline and
        returns a `job_id` immediately. The job runs asynchronously.


        **Workflow:** submit → poll `/status/{job_id}` every 5 s → pull results from
        `/pull/{job_id}`.


        **Concurrency:** the `Jobs_Concurrency` plan entitlement limits simultaneous
        in-flight jobs. A 429 is returned if the limit is reached.'
      operationId: createJob
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitRequestDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitResponseDTO'
        '400':
          description: Validation error (invalid query, bad dates, empty validators
            list, etc.)
        '403':
          description: Invalid or missing API key, or unauthorized webhook/dataset
            access
        '404':
          description: Webhook ID or project not found
        '429':
          description: Concurrency limit reached
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/initialize:
    post:
      tags:
      - Jobs
      summary: Preview suggested validators and enrichments
      description: 'Dry-run endpoint that returns the validators and enrichments the
        API would auto-generate for a given query. Use this before `/submit` to decide
        which fields to pass explicitly.


        Does **not** create a job or consume any quota.'
      operationId: initialize
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuggestInitializeRequestDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestInitializeResponseDTO'
        '400':
          description: Validation error
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/status/{job_id}:
    get:
      tags:
      - Jobs
      summary: Get job status
      description: 'Returns the current pipeline stage and step-level completion flags.


        **Recommended polling interval:** 5 seconds. Stop polling when `status` is
        `completed` or `failed`.


        **Stages in order:** submitted → analyzing → fetching → clustering → enriching
        → completed'
      operationId: getJobStatus
      parameters:
      - required: true
        schema:
          type: string
          title: Job Id
        name: job_id
        in: path
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponseDTO'
        '403':
          description: Job does not belong to this user
        '404':
          description: Job not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/pull/{job_id}:
    get:
      tags:
      - Jobs
      summary: Pull job results
      description: 'Returns paginated result records for a job.


        You may call this at any pipeline stage — `all_records` will be partially
        populated while the job is still running. Use `page` and `page_size` to paginate
        through results.'
      operationId: getJobResults
      parameters:
      - required: true
        schema:
          type: string
          title: Job Id
        name: job_id
        in: path
      - required: false
        schema:
          type: integer
          title: Page
          default: 1
        name: page
        in: query
      - required: false
        schema:
          type: integer
          title: Page Size
          default: 100
        name: page_size
        in: query
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullResponseDTO'
        '403':
          description: Job does not belong to this user
        '404':
          description: Job not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/jobs/user:
    get:
      tags:
      - Jobs
      summary: List jobs for the authenticated API key
      description: Returns a paginated list of jobs owned by or shared with the caller.
        API key values are masked in the response.
      operationId: getUserJobs
      parameters:
      - required: false
        schema:
          type: integer
          title: Page
          default: 1
        name: page
        in: query
      - required: false
        schema:
          type: integer
          title: Page Size
          default: 100
        name: page_size
        in: query
      - required: false
        schema:
          type: string
          title: Search
        name: search
        in: query
      - required: false
        schema:
          allOf:
          - $ref: '#/components/schemas/Ownership'
          default: all
        name: ownership
        in: query
      - required: false
        schema:
          type: string
          title: Project Id
        name: project_id
        in: query
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUserJobsResponseDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/jobs/{job_id}:
    delete:
      tags:
      - Jobs
      summary: Delete a job
      description: Soft-deletes a job and its associated results.
      operationId: deleteJob
      parameters:
      - required: true
        schema:
          type: string
          format: uuid
          title: Job Id
        name: job_id
        in: path
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteJobResponseDTO'
        '403':
          description: Job does not belong to this user
        '404':
          description: Job not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/continue:
    post:
      tags:
      - Jobs
      summary: Continue a job to fetch more results
      description: Use this after reviewing a completed job's results and deciding
        you want more. Increases the job's `limit` and resumes fetching — the existing
        results are kept and new ones are appended. The `Jobs_Concurrency` plan entitlement
        is re-checked; a 429 is returned if it is already exhausted.
      operationId: continueJob
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContinueRequestDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContinueResponseDTO'
        '400':
          description: Validation error or new_limit <= current limit
        '403':
          description: Job does not belong to this user
        '429':
          description: Concurrency limit reached
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/user/limits:
    post:
      tags:
      - Meta
      summary: Get plan limits
      description: Returns plan features and current usage for the authenticated organization.
      operationId: getPlanLimits
      parameters:
      - required: false
        schema:
          type: string
          title: X-Request-Id
        name: x-request-id
        in: header
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFeaturesResponse'
        '400':
          description: Invalid organization ID or subscription ID format.
        '404':
          description: Subscription or user not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/monitors/create:
    post:
      tags:
      - Monitors
      summary: Create a monitor
      description: 'Creates a scheduled monitor from a reference completed job. The
        monitor re-runs the reference job''s query/validators/enrichments on a cron
        schedule.


        The `Monitor_Active_Slots` plan entitlement is reserved on creation. Use `/disable`
        to pause without losing the slot.


        **Schedule examples:** `''every day at 9 AM''`, `''every Monday at 6 PM EST''`.'
      operationId: createMonitor
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMonitorRequestDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMonitorResponseDTO'
        '400':
          description: Validation error (invalid schedule, timezone, limit, or webhook
            limit exceeded)
        '403':
          description: Invalid or missing API key
        '404':
          description: Reference job or webhook not found
        '422':
          description: Schedule could not be parsed into a cron expression
        '429':
          description: Monitor active slots limit reached
  /catchAll/monitors/{monitor_id}/status:
    get:
      tags:
      - Monitors
      summary: Get monitor status history
      description: Returns all status entries for a monitor, ordered newest-first.
        Each entry has a status type, timestamp, and additional_information dict.
      operationId: getMonitorStatusHistory
      parameters:
      - required: true
        schema:
          type: string
          format: uuid
          title: Monitor Id
        name: monitor_id
        in: path
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorStatusHistoryResponseDTO'
        '403':
          description: Monitor does not belong to this user
        '404':
          description: Monitor not found or no status entries yet
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/monitors/{monitor_id}/jobs:
    get:
      tags:
      - Monitors
      summary: List jobs spawned by a monitor
      description: Returns all jobs created by past monitor runs, sorted by start_date.
        Each entry includes job_id, start_date, and end_date.
      operationId: listMonitorJobs
      parameters:
      - required: true
        schema:
          type: string
          format: uuid
          title: Monitor Id
        name: monitor_id
        in: path
      - description: Sort by start_date (asc or desc)
        required: false
        schema:
          type: string
          pattern: ^(asc|desc)$
          title: Sort
          description: Sort by start_date (asc or desc)
          default: asc
        name: sort
        in: query
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMonitorJobsResponseDTO'
        '403':
          description: Monitor does not belong to this user
        '404':
          description: No jobs found for this monitor
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/monitors/pull/{monitor_id}:
    get:
      tags:
      - Monitors
      summary: Pull latest results for a monitor
      description: Returns the most recent run's aggregated records. Structure mirrors
        job pull with the addition of cron_expression and reference_job.
      operationId: pullMonitorResults
      parameters:
      - required: true
        schema:
          type: string
          title: Monitor Id
        name: monitor_id
        in: path
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullMonitorResponseDTO'
        '403':
          description: Monitor does not belong to this user
        '404':
          description: Monitor not found or no results yet
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/monitors/{monitor_id}/disable:
    post:
      tags:
      - Monitors
      summary: Disable a monitor
      description: Pauses future runs without deleting the monitor or releasing the
        entitlement slot.
      operationId: disableMonitor
      parameters:
      - required: true
        schema:
          type: string
          format: uuid
          title: Monitor Id
        name: monitor_id
        in: path
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisableMonitorResponseDTO'
        '403':
          description: Monitor does not belong to this user
        '404':
          description: Monitor not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/monitors/{monitor_id}/enable:
    post:
      tags:
      - Monitors
      summary: Enable (re-activate) a monitor
      description: 'Re-activates a disabled monitor. The Monitor_Active_Slots entitlement
        is re-reserved.


        Optional body: `{ "backfill": true }` (default). When backfill=true the first
        run chains forward from the last job''s end date.'
      operationId: enableMonitor
      parameters:
      - required: true
        schema:
          type: string
          format: uuid
          title: Monitor Id
        name: monitor_id
        in: path
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnableMonitorRequestDTO'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnableMonitorResponseDTO'
        '403':
          description: Monitor does not belong to this user
        '404':
          description: Monitor not found
        '429':
          description: Monitor active slots limit reached
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/monitors/{monitor_id}:
    patch:
      tags:
      - Monitors
      summary: Update webhook assignments or limit
      description: 'Updates the webhook assignments and/or result limit for a monitor.
        Pass an empty `webhook_ids: []` to clear all webhook assignments.'
      operationId: updateMonitor
      parameters:
      - required: true
        schema:
          type: string
          format: uuid
          title: Monitor Id
        name: monitor_id
        in: path
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMonitorRequestDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateMonitorResponseDTO'
        '400':
          description: Validation error or webhook limit exceeded (max 5 per resource)
        '403':
          description: Monitor does not belong to this user
        '404':
          description: Monitor or webhook not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Monitors
      summary: Delete a monitor
      description: Soft-deletes a monitor and releases the Monitor_Active_Slots entitlement.
      operationId: deleteMonitor
      parameters:
      - required: true
        schema:
          type: string
          format: uuid
          title: Monitor Id
        name: monitor_id
        in: path
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteMonitorResponseDTO'
        '403':
          description: Monitor does not belong to this user
        '404':
          description: Monitor not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/monitors/:
    get:
      tags:
      - Monitors
      summary: List monitors for the authenticated API key
      description: Returns monitors owned by or shared with the caller. API key values
        are masked.
      operationId: listMonitors
      parameters:
      - required: false
        schema:
          type: integer
          title: Page
          default: 1
        name: page
        in: query
      - required: false
        schema:
          type: integer
          title: Page Size
          default: 100
        name: page_size
        in: query
      - required: false
        schema:
          type: string
          title: Search
        name: search
        in: query
      - required: false
        schema:
          allOf:
          - $ref: '#/components/schemas/Ownership'
          default: all
        name: ownership
        in: query
      - required: false
        schema:
          type: string
          title: Project Id
        name: project_id
        in: query
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMonitorsResponseDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/entities/:
    post:
      tags:
      - Entities
      summary: Create entity
      description: Creates a single company entity for the organization. Entities
        are the atomic units used in datasets and job targeting. Returns the new entity's
        ID and initial processing status.
      operationId: createEntity
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntityRequestDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEntityResponseDTO'
        '422':
          description: Validation error.
    get:
      tags:
      - Entities
      summary: List entities
      description: Returns a paginated list of entities for the organization. Filter
        by status, entity_type, or search by name. Supports sorting.
      operationId: listEntities
      parameters:
      - required: false
        schema:
          type: integer
          minimum: 1.0
          title: Page
          default: 1
        name: page
        in: query
      - required: false
        schema:
          type: integer
          maximum: 500.0
          minimum: 1.0
          title: Page Size
          default: 100
        name: page_size
        in: query
      - required: false
        schema:
          type: string
          title: Search
        name: search
        in: query
      - required: false
        schema:
          $ref: '#/components/schemas/EntityStatus'
        name: status
        in: query
      - required: false
        schema:
          $ref: '#/components/schemas/EntityType'
        name: entity_type
        in: query
      - required: false
        schema:
          allOf:
          - $ref: '#/components/schemas/EntitySortBy'
          default: created_at
        name: sort_by
        in: query
      - required: false
        schema:
          allOf:
          - $ref: '#/components/schemas/SortOrder'
          default: desc
        name: sort_order
        in: query
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityListResponseDTO'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/entities/batch:
    post:
      tags:
      - Entities
      summary: Batch create entities
      description: Creates multiple entities in one call. Each entity in the array
        is processed independently. Returns the IDs and statuses for all created entities.
        Useful for bulk imports.
      operationId: createEntitiesBatch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntitiesBatchRequestDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEntitiesBatchResponseDTO'
        '422':
          description: Validation error on one or more entities.
  /catchAll/entities/{entity_id}:
    get:
      tags:
      - Entities
      summary: Get entity
      description: Returns full details of a single entity by ID, including its attributes
        and current processing status.
      operationId: getEntity
      parameters:
      - required: true
        schema:
          type: string
          title: Entity Id
        name: entity_id
        in: path
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponseDTO'
        '403':
          description: Entity does not belong to this user.
        '404':
          description: Entity not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - Entities
      summary: Update entity
      description: Updates name, description, or additional_attributes of an entity.
        Only supplied fields are changed. Returns the updated entity.
      operationId: updateEntity
      parameters:
      - required: true
        schema:
          type: string
          title: Entity Id
        name: entity_id
        in: path
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntityRequestDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityResponseDTO'
        '403':
          description: Entity does not belong to this user.
        '404':
          description: Entity not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Entities
      summary: Delete entity
      description: Permanently deletes an entity. If the entity is currently part
        of a dataset, it is removed from all dataset memberships. Returns 204 No Content.
      operationId: deleteEntity
      parameters:
      - required: true
        schema:
          type: string
          title: Entity Id
        name: entity_id
        in: path
      responses:
        '204':
          description: Successful Response
        '403':
          description: Entity does not belong to this user.
        '404':
          description: Entity not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /catchAll/datasets/:
    post:
      tags:
      - Datasets
      summary: Create dataset
      description: Creates a named dataset and optionally pre-populates it with entity
        IDs. A dataset is a curated collection of companies used to scope job searches.
      operationId: createDataset
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatasetRequestDTO'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetResponseDTO'
        '400':
          description: One or more entity IDs not found.
        '403':
          description: Not authorized.
        '404':
          description: Resource not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
