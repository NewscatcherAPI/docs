      title: DeleteMonitorResponseDto
    UpdateProjectRequestDTO:
      properties:
        name:
          type: string
          title: Name
          description: New name for the project.
        description:
          type: string
          title: Description
          description: New description for the project.
      type: object
      title: UpdateProjectRequestDto
    UpdateWebhookRequestDTO:
      properties:
        name:
          type: string
          title: Name
          description: Updated webhook name.
        url:
          type: string
          title: Url
          description: Updated webhook endpoint URL.
        type:
          allOf:
          - $ref: '#/components/schemas/WebhookType'
          description: Updated webhook target type.
        delivery_mode:
          allOf:
          - $ref: '#/components/schemas/DeliveryMode'
          description: Updated delivery mode.
        method:
          allOf:
          - $ref: '#/components/schemas/HttpMethod'
          description: Updated HTTP method.
        headers:
          additionalProperties:
            type: string
          type: object
          title: Headers
          description: Updated HTTP headers.
        params:
          additionalProperties:
            type: string
          type: object
          title: Params
          description: Updated query string parameters.
        auth:
          oneOf:
          - $ref: '#/components/schemas/BearerAuthDTO'
          - $ref: '#/components/schemas/ApiKeyAuthDTO'
          - $ref: '#/components/schemas/BasicAuthDTO'
          title: Auth
          description: 'Authentication forwarded with each delivery. Supported types:
            ''bearer'' (token), ''api_key'' (header + value), ''basic'' (username
            + password).'
          discriminator:
            propertyName: type
            mapping:
              bearer: '#/components/schemas/BearerAuthDTO'
              api_key: '#/components/schemas/ApiKeyAuthDTO'
              basic: '#/components/schemas/BasicAuthDTO'
        formatter_config:
          type: object
          title: Formatter Config
          description: Updated formatter configuration.
        is_active:
          type: boolean
          title: Is Active
          description: Set to true to activate or false to deactivate.
      type: object
      title: UpdateWebhookRequestDto
    CreateMonitorRequestDTO:
      properties:
        reference_job_id:
          type: string
          format: uuid
          title: Reference Job Id
          description: ID of a completed job whose query/validators/enrichments this
            monitor should repeat.
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        schedule:
          type: string
          title: Schedule
          description: 'Natural-language schedule string converted to a cron expression.
            Examples: ''every day at 9 AM'', ''every Monday at 6 PM EST''. An inline
            timezone in the text overrides the timezone field.'
          example: every day at 9 AM
        timezone:
          type: string
          title: Timezone
          description: IANA timezone for the schedule (e.g. 'America/New_York'). Overridden
            if the schedule text itself contains a timezone.
          default: UTC
          example: America/New_York
        webhook_ids:
          items:
            type: string
            format: uuid
          type: array
          title: Webhook Ids
          description: Webhook IDs to notify on each run completion. Max 5 per monitor.
        limit:
          type: integer
          title: Limit
          description: Max results per monitor run. Minimum 10. Validated against
            plan limit.
          example: 50
        backfill:
          type: boolean
          title: Backfill
          description: If true, the first run chains forward from the reference job's
            end date (enforces a 7-day lookback check). If false, the first run uses
            the current cron window.
          default: true
        project_id:
          type: string
          title: Project Id
          description: Project to associate this monitor with.
      type: object
      required:
      - reference_job_id
      - schedule
      title: CreateMonitorRequestDto
    DatasetResponseDTO:
      properties:
        id:
          type: string
          title: Id
          description: Unique identifier of the dataset.
        organization_id:
          type: string
          title: Organization Id
          description: Organization that owns this dataset.
        name:
          type: string
          title: Name
          description: Dataset name.
        description:
          type: string
          title: Description
          description: Optional description.
        entity_count:
          type: integer
          title: Entity Count
          description: Total number of entities in this dataset.
          default: 0
        entity_status_breakdown:
          additionalProperties:
            type: integer
          type: object
          title: Entity Status Breakdown
          description: Count of entities grouped by processing status.
        health_score:
          type: number
          title: Health Score
          description: Overall health score of the dataset.
        health_breakdown:
          additionalProperties:
            type: number
          type: object
          title: Health Breakdown
          description: Health scores broken down by attribute.
        latest_status:
          type: string
          title: Latest Status
          description: Most recent processing status of the dataset.
        created_by_user_id:
          type: string
          title: Created By User Id
          description: ID of the user who created this dataset.
        sharing_info:
          allOf:
          - $ref: '#/components/schemas/SharingInfoDTO'
          title: Sharing Info
          description: Present when this dataset was shared with the authenticated
            user.
        created_at:
          type: string
          format: date-time
          title: Created At
          description: Timestamp of when the dataset was created.
        updated_at:
          type: string
          format: date-time
          title: Updated At
          description: Timestamp of when the dataset was last updated.
      type: object
      required:
      - id
      - organization_id
      - name
      title: DatasetResponse
    DatasetStatus:
      type: string
      enum:
      - pending
      - enriching
      - ready
      - failed
      title: DatasetStatus
      description: 'Processing status of a dataset: pending → enriching → ready. Failed
        indicates one or more entity enrichments failed.'
    SubmitRequestDTO:
      properties:
        query:
          type: string
          minLength: 1
          title: Query
          description: Natural-language question. Keywords and search queries are
            extracted automatically.
        schema:
          type: string
          title: Schema
          description: 'Advanced: custom JSON schema string that overrides the default
            extraction schema. Use POST /initialize to discover a suitable schema.'
        context:
          type: string
          title: Context
          description: Additional context to sharpen the search scope (geography,
            industry, time frame, etc.).
        limit:
          type: integer
          title: Limit
          description: Maximum number of validated records to collect. Minimum 10.
            Defaults to the plan limit. Use POST /continue to raise the limit later.
        start_date:
          type: string
          format: date-time
          title: Start Date
          description: Earliest article date (ISO-8601 or free-text like '2024-01-01').
            If start_date is provided and end_date is omitted, end_date defaults to
            now.
        end_date:
          type: string
          format: date-time
          title: End Date
          description: Latest article date. Cannot be provided without start_date.
        validators:
          items:
            $ref: '#/components/schemas/ValidatorSchema'
          type: array
          title: Validators
          description: Boolean classifiers. Only articles where every validator returns
            true are counted in valid_records. Provide at least one item or omit entirely.
        enrichments:
          items:
            $ref: '#/components/schemas/EnrichmentSchema'
          type: array
          title: Enrichments
          description: Custom extraction fields added to each result record under
            enrichments.<name>. Provide at least one item or omit entirely.
        mode:
          type: string
          title: Mode
          description: Processing mode. 'base' runs the full pipeline with clustering
            and enrichment. 'lite' is faster with no clustering.
          default: base
        connected_dataset_ids:
          items:
            type: string
          type: array
          title: Connected Dataset Ids
          description: IDs of datasets whose entities narrow the retrieval scope.
            When provided, ed_score_min defaults to 2 if not specified.
        ed_score_min:
          type: integer
          title: Ed Score Min
          description: Minimum entity-domain relevance score (1–10). Only relevant
            when connected_dataset_ids is set. Defaults to 2.
        webhook_ids:
          items:
            type: string
            format: uuid
          type: array
          title: Webhook Ids
          description: Webhook IDs to notify when the job completes. Max 5 per job.
        project_id:
          type: string
          title: Project Id
          description: Project ID to associate this job with.
      type: object
      required:
      - query
      title: SubmitRequestDto
      example:
        query: Tech layoffs in 2024
        context: Focus on US-based companies with 500+ employees.
        limit: 100
        start_date: '2024-01-01T00:00:00Z'
        mode: base
        validators:
        - name: is_about_layoffs
          description: The article specifically covers workforce reductions or layoffs.
          type: boolean
        enrichments:
        - name: company_name
          description: The company conducting the layoffs.
          type: company
        - name: employees_affected
          description: Number of employees affected, if mentioned.
          type: number
    EntitySortBy:
      type: string
      enum:
      - created_at
      - name
      - status
      title: EntitySortBy
      description: Fields available for sorting entity list results.
    UpdateMonitorRequestDTO:
      properties:
        webhook_ids:
          items:
            type: string
            format: uuid
          type: array
          title: Webhook Ids
          description: Optional list of centralized webhook IDs to assign to this
            monitor. Empty list clears assignments.
        limit:
          type: integer
          title: Limit
          description: Optional max results per monitor run (min 10, validated against
            plan)
      type: object
      title: UpdateMonitorRequestDto
    UpdateEntityRequestDTO:
      properties:
        name:
          type: string
          title: Name
          description: Updated entity name.
        description:
          type: string
          title: Description
          description: Updated description.
        additional_attributes:
          allOf:
          - $ref: '#/components/schemas/AdditionalAttributesDTO'
          title: Additional Attributes
          description: Updated type-specific attributes.
      type: object
      title: UpdateEntityRequest
    ProjectResourceTypeEnum:
      type: string
      enum:
      - job
      - monitor
      - dataset
      - monitor_group
      title: ProjectResourceTypeEnum
      description: Resource type for project association.
    Body_uploadCSVToDataset:
      properties:
        file:
          type: string
          format: binary
          title: File
      type: object
      required:
      - file
      title: Body_uploadCSVToDataset
    SubmitResponseDTO:
      properties:
        job_id:
          type: string
          title: Job Id
          description: UUID of the created job. Use this in /status and /pull.
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      type: object
      required:
      - job_id
      title: SubmitResponseDto
    SortOrder:
      type: string
      enum:
      - asc
      - desc
      title: SortOrder
      description: Sort direction for list results. 'asc' for ascending (oldest first),
        'desc' for descending (newest first).
    CreateMonitorResponseDTO:
      properties:
        monitor_id:
          type: string
          format: uuid
          title: Monitor Id
          description: Monitor identifier. Null if creation failed.
        status:
          type: string
          title: Status
          description: Creation status or error message.
          default: Monitor Created Successfully
      type: object
      title: CreateMonitorResponseDto
    CreateEntitiesBatchResponseDTO:
      properties:
        entities:
          items:
            $ref: '#/components/schemas/CreateEntityResponseDTO'
          type: array
          title: Entities
          description: Array of created entity stubs in the same order as the input.
        count:
          type: integer
          title: Count
          description: Total number of entities created.
      type: object
      required:
      - entities
      - count
      title: CreateEntitiesBatchResponse
    SuggestInitializeRequestDTO:
      properties:
        query:
          type: string
          title: Query
          description: Natural-language question to analyse. The API returns the validators
            and enrichments it would auto-generate for this query.
          example: Which airlines expanded their routes in Asia?
        context:
          type: string
          title: Context
          description: Optional context string that sharpens the suggested fields.
          default: ''
          example: Focus on low-cost carriers.
      type: object
      required:
      - query
      title: InitializeRequestDto
      example:
        query: Which airlines expanded their routes in Asia?
        context: Focus on low-cost carriers.
    DisableMonitorResponseDTO:
      properties:
        success:
          type: boolean
          title: Success
          description: True if the operation succeeded; false otherwise.
        message:
          type: string
          title: Message
          description: Human-readable success message.
        monitor_id:
          type: string
          title: Monitor Id
          description: ID of the disabled monitor.
      type: object
      required:
      - success
      - message
      title: DisableMonitorResponseDto
    CreateDatasetRequestDTO:
      properties:
        name:
          type: string
          minLength: 1
          title: Name
          description: Name for the dataset.
        description:
          type: string
          title: Description
          description: Optional description.
        entity_ids:
          items:
            type: string
          type: array
          title: Entity Ids
          description: IDs of existing entities to include in the dataset.
        project_id:
          type: string
          title: Project Id
          description: Project to assign this dataset to.
      type: object
      required:
      - name
      title: CreateDatasetRequest
    EntityStatus:
      type: string
      enum:
      - pending
      - enriching
      - ready
      - failed
      title: EntityStatus
      description: 'Processing status of an entity: pending → enriching → ready. Failed
        entities may still be used but matching quality may be reduced.'
    ListMonitorsResponseDTO:
      properties:
        total:
          type: integer
          title: Total
          description: Total number of monitors for this user.
        page:
          type: integer
          title: Page
          description: Current page number.
        page_size:
