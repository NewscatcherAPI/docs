      title: AddResourceRequestDto
    DeleteProjectResponseDTO:
      properties:
        success:
          type: boolean
          title: Success
          description: True if the operation succeeded; false otherwise.
        message:
          type: string
          title: Message
          description: Human-readable result message.
        project_id:
          type: string
          title: Project Id
          description: ID of the deleted project.
        deleted_resources:
          additionalProperties:
            type: integer
          type: object
          title: Deleted Resources
          description: Count of deleted resources grouped by type.
      type: object
      required:
      - success
      - message
      title: DeleteProjectResponseDto
    MonitorStatusHistoryResponseDTO:
      properties:
        success:
          type: boolean
          title: Success
          description: True if the request succeeded; false otherwise.
        message:
          type: string
          title: Message
          description: Optional message. Null on success.
        monitor_id:
          type: string
          format: uuid
          title: Monitor Id
