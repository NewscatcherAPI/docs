    CreateWebhookRequestDTO:
      properties:
        name:
          type: string
          title: Name
          description: Human-readable label for this webhook.
          example: Layoffs Alert
        url:
          type: string
          title: Url
          description: Destination URL that receives the payload.
          example: https://hooks.slack.com/services/T000/B000/xxxx
        type:
          allOf:
          - $ref: '#/components/schemas/WebhookType'
          description: Webhook target type. 'slack' and 'teams' send pre-formatted
            payloads; 'generic' and 'custom' send the raw result payload.
          default: generic
        delivery_mode:
          allOf:
          - $ref: '#/components/schemas/DeliveryMode'
          description: '''full'' delivers the entire result set in one call; ''per_record''
            sends one call per article.'
          default: full
        method:
          allOf:
          - $ref: '#/components/schemas/HttpMethod'
          description: HTTP method used for delivery.
          default: POST
        headers:
          additionalProperties:
            type: string
          type: object
          title: Headers
          description: Custom HTTP headers forwarded with each delivery.
          default: {}
        params:
          additionalProperties:
            type: string
          type: object
          title: Params
          description: Query parameters appended to the webhook URL.
          default: {}
        auth:
          oneOf:
          - $ref: '#/components/schemas/BearerAuthDTO'
          - $ref: '#/components/schemas/ApiKeyAuthDTO'
          - $ref: '#/components/schemas/BasicAuthDTO'
          title: Auth
          description: 'Authentication forwarded with each delivery. Supported types:
            ''bearer'' (token), ''api_key'' (header + value), ''basic'' (username
            + password).'
          discriminator:
            propertyName: type
            mapping:
              bearer: '#/components/schemas/BearerAuthDTO'
              api_key: '#/components/schemas/ApiKeyAuthDTO'
              basic: '#/components/schemas/BasicAuthDTO'
        formatter_config:
          type: object
          title: Formatter Config
          description: Custom payload transformation config.
      type: object
      required:
      - name
      - url
      title: CreateWebhookRequestDto
      example:
        name: Layoffs Alert
        url: https://hooks.slack.com/services/T000/B000/xxxx
        type: slack
        delivery_mode: full
